name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      # This automatically installs a complete version of Gradle 8.7 in the cloud
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.7
        
      # We use plain "gradle" now instead of "./gradlew" to ignore missing file errors
      - name: Build with Gradle
        run: gradle assembleDebug --no-daemon
        
      # Using a double asterisk (**) ensures GitHub finds your APK no matter how AI Studio structured your folders
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: "**/build/outputs/apk/debug/*.apk"
          
