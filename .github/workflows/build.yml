name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          # We removed the cache definition here to avoid GitHub's outage

      - name: Auto-accept Android SDK Licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Setup and Run Gradle Build
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.3.1
          cache-disabled: true # Directly bypasses the broken GitHub Cache service
          arguments: assembleDebug
          
