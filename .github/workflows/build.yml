name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: Generate Missing Debug Keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          mkdir -p app
          cp debug.keystore app/debug.keystore
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.3.1
          cache-disabled: true
        
      - name: Build with Gradle
        run: gradle assembleDebug --no-daemon

      # This new step automatically changes the file name from app-debug.apk to Routiner.apk
      - name: Rename Output File
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/Routiner.apk
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Routiner-App-File
          path: "**/build/outputs/apk/debug/Routiner.apk"
          
